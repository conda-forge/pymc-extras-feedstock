schema_version: 1

context:
  name: pymc-extras
  version: 0.13.0
  python_min: '3.12'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pymc_extras-${{ version }}.tar.gz
  sha256: bf36923c67acf0c9beaa20ce5d00d256a44498ab6695aaebf26f899005370f10

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - pymc >=6.1.0,<6.2
    - arviz >=1.1
    - better-optimize >=0.4.2,<1.0
    - pydantic >=2.0.0
    - preliz >=0.26.0,<0.27.0
    - matplotlib-base <3.11
    - pytensor >=3.1.3,<3.2
tests:
  - python:
      imports:
        - pymc_extras
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - 3.*

about:
  summary: A home for new additions to PyMC, which may include unusual probability distribitions, advanced model fitting algorithms, or any code that may be inappropriate to include in the pymc repository, but may want to be made available to users.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/pymc-devs/pymc-extras

extra:
  recipe-maintainers:
    - jessegrabowski
    - ricardoV94
    - maresb
    - fonnesbeck
